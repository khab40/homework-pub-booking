flows:
  confirm_booking:
    description: >
      Confirm a pub booking after validating party size and deposit.
      Triggers when the structured half sends /confirm_booking with
      booking metadata.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: rejected
          - else: confirmed
      - id: rejected
        action: utter_booking_rejected
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END

  resume_from_loop:
    description: >
      Resume the structured half after the loop half hands off a booking
      mid-scenario. The booking payload arrives as message metadata and
      is validated before the flow commits or rejects.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: rejected
          - else: confirmed
      - id: rejected
        action: utter_booking_rejected
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END

  request_research:
    description: >
      Ask the loop half to research another venue when the proposed
      booking cannot be accepted under the structured policy cap.
      This is used for oversize parties, high deposits, or invalid
      booking payloads that need loop-side correction.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: research
          - else: confirmed
      - id: research
        action: utter_research_requested
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END
